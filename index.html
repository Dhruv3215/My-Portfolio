<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhruv Patel | Cybersecurity Professional</title>    
    <!-- SEO Meta -->
    <meta name="description" content="Dhruv Patel — Cybersecurity professional specialising in penetration testing, SOC analysis, and vulnerability assessment. Built enterprise EDR solutions detecting 8 MITRE ATT&CK tactics live. 83% CVE risk reduction via automated remediation." />
    <meta name="keywords" content="cybersecurity, penetration testing, SOC analyst, vulnerability assessment, MITRE ATT&CK, Wazuh, Burp Suite, red team, incident response, Dhruv Patel, Gandhinagar" />
    <meta name="author" content="Dhruv Patel" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://dhruv3215.github.io/My-Portfolio/" />

    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- React 18 + ReactDOM -->
    <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Framer Motion -->
    <script defer src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script defer src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --navy-lighter: #1a2f4a;
            --cyan: #00d9ff;
            --cyan-glow: rgba(0, 217, 255, 0.4);
            --green: #00ff88;
            --white: #e6f1ff;
            --gray: #8892b0;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--navy);
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--navy-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 5px;
        }

        /* Typography */
        h1, h2, h3 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .display {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: all 0.3s ease;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav.scrolled {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            padding: 1rem 5%;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav ul li a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            transition: color 0.2s;
            position: relative;
            cursor: pointer;
        }

        nav ul li a:hover {
            color: var(--cyan);
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--cyan);
            transition: width 0.3s;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: 0.6rem 1.5rem;
            border: 2px solid var(--cyan);
            border-radius: 4px;
            color: var(--cyan);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-cta:hover {
            background: var(--cyan);
            color: var(--navy);
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--cyan);
            transition: all 0.3s;
        }

        /* Hero Section */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 5%;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, transparent 0%, rgba(0, 217, 255, 0.03) 100%),
                radial-gradient(circle at 50% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .hero-greeting {
            font-size: 1.2rem;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 0.2s;
        }

        .hero-name {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--white) 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 0.4s;
        }

        .hero-title {
            font-size: 2.5rem;
            color: var(--gray);
            margin-bottom: 2rem;
            font-weight: 300;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 0.6s;
        }

        .role-cycling {
            display: inline-block;
            color: var(--cyan);
            font-weight: 600;
            min-width: 300px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.5rem;
            background: var(--green);
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .hero-ctas {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 0.8s;
            margin-top: 2rem;
        }

        .btn-primary, .btn-secondary {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--cyan);
            color: var(--navy);
            font-weight: bold;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px var(--cyan-glow);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border: 2px solid var(--cyan);
            color: var(--cyan);
            background: transparent;
        }

        .btn-secondary:hover {
            background: rgba(0, 217, 255, 0.1);
        }

        .hero-stats {
            display: flex;
            gap: 3rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 217, 255, 0.15);
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards 1.2s;
        }

        .hero-stat {
            text-align: center;
        }

        .hero-stat-num {
            font-size: 2rem;
            font-weight: bold;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .hero-stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Sections */
        section {
            padding: 6rem 5%;
            position: relative;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--cyan);
        }

        /* About Section */
        #about {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
        }

        .about-content {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(17, 34, 64, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .about-content::before {
            content: '$ whoami --verbose';
            position: absolute;
            top: 1rem;
            left: 2rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .about-text {
            margin-top: 2rem;
            font-size: 1.1rem;
            line-height: 1.9;
            color: var(--gray);
        }

        .about-text p {
            margin-bottom: 1.5rem;
        }

        .highlight {
            color: var(--cyan);
            font-weight: 600;
        }

        /* Skills Section */
        #skills {
            background: var(--navy);
            overflow: hidden;
        }

        .skills-wrapper {
            max-width: 100%;
            overflow: hidden;
            position: relative;
            padding: 2rem 0;
        }

        .skills-grid {
            display: flex;
            gap: 2rem;
            padding: 2rem 5%;
            animation: skillsHorizontalScroll 60s linear infinite;
            width: max-content;
        }



        @keyframes skillsHorizontalScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(-50% - 1rem));
            }
        }

        /* Gradient fade edges */
        .skills-wrapper::before,
        .skills-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            width: 150px;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .skills-wrapper::before {
            left: 0;
            background: linear-gradient(90deg, var(--navy) 0%, transparent 100%);
        }

        .skills-wrapper::after {
            right: 0;
            background: linear-gradient(270deg, var(--navy) 0%, transparent 100%);
        }

        .skill-card {
            background: rgba(17, 34, 64, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            min-width: 320px;
            max-width: 320px;
            flex-shrink: 0;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .skill-card:hover::before {
            left: 100%;
        }

        .skill-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 30px var(--cyan-glow);
            transform: translateY(-10px) scale(1.05);
            z-index: 10;
        }

        .skill-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(0, 255, 136, 0.1));
            border-radius: 50%;
            border: 2px solid var(--cyan);
            position: relative;
        }

        .skill-icon::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--cyan), var(--green));
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            filter: blur(10px);
        }

        .skill-card:hover .skill-icon::before {
            opacity: 0.5;
        }

        .skill-tools {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .tool-icon {
            font-size: 1.5rem;
            opacity: 0.7;
            transition: all 0.3s;
        }

        .skill-card:hover .tool-icon {
            opacity: 1;
            transform: scale(1.2);
        }

        .skill-title {
            font-size: 1.4rem;
            color: var(--cyan);
            margin-bottom: 1rem;
            text-align: center;
        }

        .skill-list {
            list-style: none;
        }

        .skill-list li {
            padding: 0.5rem 0;
            color: var(--gray);
            font-size: 0.95rem;
            position: relative;
            padding-left: 1.5rem;
        }

        .skill-list li::before {
            content: '▹';
            position: absolute;
            left: 0;
            color: var(--cyan);
            font-size: 1.2rem;
        }

        /* Experience Section */
        #experience {
            background: linear-gradient(160deg, var(--navy-light) 0%, var(--navy) 60%);
        }

        .exp-grid {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .exp-card {
            position: relative;
            background: rgba(17, 34, 64, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 16px;
            padding: 2.2rem 2.4rem 2rem;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s;
        }

        .exp-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,217,255,0.04) 0%, transparent 60%);
            pointer-events: none;
            border-radius: 16px;
        }

        .exp-card:hover {
            border-color: rgba(0, 217, 255, 0.55);
            transform: translateY(-4px);
        }

        .exp-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 3px;
            background: linear-gradient(to bottom, var(--cyan), transparent);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s;
        }

        .exp-card:hover::after {
            top: 0;
            height: 100%;
        }

        .exp-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .exp-company {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--cyan);
            line-height: 1;
        }

        .exp-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--cyan);
            background: rgba(0, 217, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 20px;
            padding: 0.3rem 0.9rem;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .exp-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.4rem;
        }

        .exp-role {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--white);
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .exp-divider {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--gray);
            opacity: 0.5;
        }

        .exp-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--gray);
            opacity: 0.8;
        }

        .exp-stats {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid rgba(0, 217, 255, 0.1);
        }

        .exp-stat {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--gray);
        }

        .exp-stat-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            opacity: 0.7;
            flex-shrink: 0;
        }

        .exp-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .exp-list li {
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            color: var(--gray);
            font-size: 0.96rem;
            line-height: 1.75;
        }

        .exp-list li .exp-arrow {
            color: var(--cyan);
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 0.08rem;
            opacity: 0.85;
        }

        .exp-kw {
            color: rgba(230, 241, 255, 0.88);
            font-weight: 600;
        }

        /* Projects Section */
        #projects {
            background: var(--navy);
        }

        .projects-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .project-card {
            background: rgba(17, 34, 64, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .project-card:hover::before {
            transform: scaleX(1);
        }

        .project-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 10px 40px var(--cyan-glow);
            transform: translateY(-10px);
        }

        .project-image {
            width: 100%;
            height: 160px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(0, 217, 255, 0.2);
            background: var(--navy-light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-card:hover .project-image img {
            transform: scale(1.05);
        }

        .project-image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .project-image-placeholder span:first-child {
            font-size: 2rem;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .project-icon {
            width: 50px;
            height: 50px;
            background: var(--cyan);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--navy);
        }

        .project-links {
            display: flex;
            gap: 1rem;
        }

        .project-link {
            color: var(--gray);
            font-size: 1.3rem;
            transition: all 0.2s;
            text-decoration: none;
        }

        .project-link:hover {
            color: var(--cyan);
            transform: translateY(-3px);
        }

        .project-title {
            font-size: 1.8rem;
            color: var(--white);
            margin-bottom: 1rem;
        }

        .project-description {
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tech-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--cyan);
            background: rgba(0, 217, 255, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        /* Project Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--navy-light);
            border: 2px solid var(--cyan);
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 3rem;
            position: relative;
            box-shadow: 0 0 50px var(--cyan-glow);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--cyan);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            transform: rotate(90deg);
            color: var(--white);
        }

        .modal-header {
            margin-bottom: 2rem;
        }

        .modal-title {
            font-size: 2.5rem;

        /* Loading Animation */
        .loading-overlay {

            0% { width: 0%; }

        /* Particle Background */
        #particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

        @media (max-width: 1024px) {

    </style>
</head>
<body>
    <!-- Particle background canvas -->
    <canvas id="particle-bg"></canvas>

    <div id="root"></div>

    <script type="text/babel">
        // Particle Background Script
        (function() {
            const canvas = document.getElementById('particle-bg');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            const particles = [];
            const particleCount = 80;
            const maxDist = 150;
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.r = Math.random() * 2 + 1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.fillStyle = '#00d9ff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[j].x - particles[i].x;
                        const dy = particles[j].y - particles[i].y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < maxDist) {
                            ctx.strokeStyle = `rgba(0, 217, 255, ${(1 - dist / maxDist) * 0.7})`;
                            ctx.lineWidth = 0.4;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        })();

        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Main App Component
        const App = () => {
            const [loading, setLoading] = useState(true);
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);
            const [showBackToTop, setShowBackToTop] = useState(false);

            useEffect(() => {
                setTimeout(() => setLoading(false), 2500);

                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                    setShowBackToTop(window.scrollY > 500);
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                setMobileMenuOpen(false);
            };

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <>
                    <AnimatePresence>
                        {loading && <LoadingScreen />}
                    </AnimatePresence>

                    <Navigation 
                        scrolled={scrolled} 
                        mobileMenuOpen={mobileMenuOpen}
                        setMobileMenuOpen={setMobileMenuOpen}
                        scrollToSection={scrollToSection}
                    />
                    <Hero />
                    <About />
                    <Skills />
                    <Experience />
                    <Projects selectedProject={selectedProject} setSelectedProject={setSelectedProject} />
                    <Certifications />
                    <Contact />
                    <Footer />
                    
                    <button 
                        className={`back-to-top ${showBackToTop ? 'visible' : ''}`}
                        onClick={scrollToTop}
                    >
                        ↑
                    </button>
                </>
            );
        };

        // Loading Screen Component
        const LoadingScreen = () => (
            <motion.div 
                className="loading-overlay"
                initial={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                transition={{ duration: 0.5 }}
            >
                <div className="loading-text">user@dhruv:~$ ./init-portfolio.sh</div>
                <div className="loading-bar">
                    <div className="loading-progress"></div>
                </div>
            </motion.div>
        );

        // Navigation Component
        const Navigation = ({ scrolled, mobileMenuOpen, setMobileMenuOpen, scrollToSection }) => (
            <nav className={scrolled ? 'scrolled' : ''}>
                <div className="logo">DHRUV PATEL</div>
                <ul className={mobileMenuOpen ? 'mobile-active' : ''}>
                    <li><a onClick={() => scrollToSection('about')}>About</a></li>
                    <li><a onClick={() => scrollToSection('skills')}>Skills</a></li>
                    <li><a onClick={() => scrollToSection('experience')}>Experience</a></li>
                    <li><a onClick={() => scrollToSection('projects')}>Projects</a></li>
                    <li><a onClick={() => scrollToSection('certifications')}>Certifications</a></li>
                    <li><a onClick={() => scrollToSection('contact')} className="nav-cta">Contact</a></li>
                </ul>
                <div className="menu-toggle" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        );

        // Hero Component
        const Hero = () => {
            const lines = [
                'I break systems to defend them.',
                'SOC Analyst  ·  Pentester  ·  Vuln Assessment'
            ];
            const [currentIndex, setCurrentIndex] = useState(0);
            const [displayedText, setDisplayedText] = useState('');
            const [isDeleting, setIsDeleting] = useState(false);
            const [typingSpeed, setTypingSpeed] = useState(80);

            useEffect(() => {
                const current = lines[currentIndex];
                const handleTyping = () => {
                    if (!isDeleting) {
                        if (displayedText.length < current.length) {
                            setDisplayedText(current.slice(0, displayedText.length + 1));
                            setTypingSpeed(80);
                        } else {
                            setTimeout(() => setIsDeleting(true), 2500);
                        }
                    } else {
                        if (displayedText.length > 0) {
                            setDisplayedText(current.slice(0, displayedText.length - 1));
                            setTypingSpeed(40);
                        } else {
                            setIsDeleting(false);
                            setCurrentIndex((prev) => (prev + 1) % lines.length);
                        }
                    }
                };
                const timer = setTimeout(handleTyping, typingSpeed);
                return () => clearTimeout(timer);
            }, [displayedText, isDeleting, currentIndex, typingSpeed]);

            const stats = [
                { num: '500+', label: 'Alerts Detected' },
                { num: '83%',  label: 'CVE Reduction' },
                { num: '4',    label: 'Tools Shipped' },
                { num: '2',    label: 'Internships' },
            ];

            return (
                <section id="hero">
                    <div className="hero-content">
                        <h1 className="hero-name">Dhruv Patel</h1>
                        <h2 className="hero-title">
                            <span className="role-cycling">
                                {displayedText}<span className="cursor"></span>
                            </span>
                        </h2>
                        <div className="hero-ctas">
                            <a href="#projects" className="btn-primary">View My Work</a>
                            <a href="https://drive.google.com/file/d/1hLGaaoFwxhtciG7cyM4bnuh3JIGnCCp3/view?usp=drive_link"
                               target="_blank" rel="noopener noreferrer"
                               className="btn-primary" style={{background:'transparent',border:'2px solid var(--green)',color:'var(--green)'}}>
                               Download Resume
                            </a>
                            <a href="#contact" className="btn-secondary">Get In Touch</a>
                        </div>
                        <div className="hero-stats">
                            {stats.map(s => (
                                <div key={s.label} className="hero-stat">
                                    <div className="hero-stat-num">{s.num}</div>
                                    <div className="hero-stat-label">{s.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // About Component
        const About = () => {
            const aboutRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    },
                    { threshold: 0.2 }
                );

                if (aboutRef.current) {
                    observer.observe(aboutRef.current);
                }

                return () => observer.disconnect();
            }, []);

            return (
                <section id="about" ref={aboutRef}>
                    <motion.div
                        initial={{ opacity: 0, y: 50 }}
                        animate={isVisible ? { opacity: 1, y: 0 } : {}}
                        transition={{ duration: 0.6 }}
                    >
                        <div className="section-header">
                            <h2 className="section-title">About Me</h2>
                        </div>
                        <div className="about-content">
                            <div className="about-text">
                                <p>
                                    As an intern, I architected an enterprise EDR lab , not a class project , 
                                    and watched it catch a <span className="highlight">live ransomware kill chain</span> in 
                                    real time across 8 MITRE ATT&CK tactics. That's when I knew this is the work I want 
                                    to do. I find the most interesting part of security is the gap between this system looks secure and it isn't and I spend most of my time living in that gap.
                                </p>
                                <p>
                                    During my internship at <span className="highlight">Infotact Solutions</span>, I architected 
                                    <span className="highlight"> Sentient Shield</span>, an enterprise EDR lab that processed 
                                    500+ alerts across 8 MITRE ATT&CK tactics. I also developed <span className="highlight">VulnVision-360</span>, 
                                    achieving an 83% reduction in CVE exploitation risk through automated remediation using tool pipeline <span className="highlight"> NMAP , OSCAP , OPENVAS SCANNER </span> and experienced how <span className="highlight"> Vulnerability Assessment</span> works in industries .
                                </p>
                                <p>
                                    I've completed nearly the entire <span className="highlight">PortSwigger Web Security Academy</span>, 
                                    covering advanced topics like SQLi, XSS, SSRF, and authentication flaws and gain hands-on experience in <span className="highlight"> Web Security</span> concepts. I actively practice 
                                    on platforms like <span className="highlight">TryHackMe</span>, <span className="highlight">Hack The Box</span>, 
                                    and maintain hands-on experience with Kali Linux and various penetration testing tools.
                                </p>
                                <p>
                                    Pursuing my <span className="highlight">B.Tech in Cybersecurity</span> at Gandhinagar 
                                    Institute of Technology (graduating Aug 2027). Active on 
                                    <span className="highlight"> TryHackMe</span> and 
                                    <span className="highlight"> Hack The Box</span>  not just for points, 
                                    but because real machines teach things labs don't.
                                </p>
                                <p>
                                    Currently: open to full-time, internship, or remote roles in 
                                    <span className="highlight"> SOC Analysis</span>, 
                                    <span className="highlight"> Penetration Testing</span> & 
                                    <span className="highlight"> Vulnerability Assessment</span>.
                                </p>
                            </div>
                        </div>
                    </motion.div>
                </section>
            );
        };

        // Skills Component
        const Skills = () => {
            const skillsData = [
                {
                    title: 'Offensive Security & Red Team',
                    skills: ['Nmap', 'Metasploit', 'Hydra', 'Burp Suite', 'Nessus', 'OpenVAS', 'GHDB', 'CVE exploitation', 'SQLi, XSS, CSRF, SSRF, SSTI'],
                    icon: '🎯',
                },
                {
                    title: 'Incident Response & Alert Triage',
                    skills: ['Wazuh', 'Splunk', 'Elastic', 'Snort', 'Sysmon', 'Atomic Red Team', 'MITRE ATT&CK Framework'],
                    icon: '🚨',
                },
                {
                    title: 'Threat Intelligence & Vulnerability Assessment',
                    skills: ['OpenVAS', 'OpenSCAP', 'Ansible', 'CIS Benchmarks', 'CVE analysis', 'Threat hunting'],
                    icon: '🔍',
                },
                {
                    title: 'Forensics & Analysis',
                    skills: ['Autopsy', 'FTK', 'Wireshark', 'Packet inspection', 'Linux log analysis'],
                    icon: '🔬',
                },
                {
                    title: 'Scripting & Development',
                    skills: ['Python', 'Bash', 'HTML/CSS', 'MySQL', 'C++'],
                    icon: '💻',
                },
                {
                    title: 'Bug Bounty & Reconnaissance',
                    skills: ['Subfinder', 'Amass', 'Gobuster', 'Dirsearch', 'Waybackurls', 'Nuclei', 'Masscan', 'Wafw00f'],
                    icon: '🐛',
                }
            ];

            const duplicatedSkills = [...skillsData, ...skillsData];

            return (
                <section id="skills">
                    <div className="section-header">
                        <h2 className="section-title">Technical Arsenal</h2>
                    </div>
                    <div className="skills-wrapper">
                        <div className="skills-grid">
                            {duplicatedSkills.map((category, index) => (
                                <SkillCard key={`skill-${index}`} {...category} index={index} />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // Skill Card Component
        const SkillCard = ({ title, skills, icon, tools, index }) => {
            const cardRef = useRef(null);
